<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portal Admin HRD SIMPEG PT Nusantara Jaya — Kelola data pegawai, absensi, dan permohonan cuti.">
  <title>Portal Admin — SIMPEG PT Nusantara Jaya</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="app-layout" data-theme="light">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar">

    <!-- Brand -->
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon"><i data-lucide="building-2"></i></div>
        <div class="sidebar-brand-text">
          <h2>PT <span class="gold">Nusantara</span> Jaya</h2>
          <span>SIMPEG Admin</span>
        </div>
      </div>
    </div>



    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Dashboard</div>

      <button class="nav-item active" data-page="dashboard" onclick="adminNavigateTo('dashboard')">
        <span class="nav-item-icon"><i data-lucide="layout-dashboard"></i></span>
        <span>Dashboard Overview</span>
      </button>

      <div class="sidebar-nav-label">Kelola</div>

      <button class="nav-item" data-page="data-pegawai" onclick="adminNavigateTo('data-pegawai')">
        <span class="nav-item-icon"><i data-lucide="users"></i></span>
        <span>Data Pegawai</span>
      </button>

      <button class="nav-item" data-page="manajemen-absensi" onclick="adminNavigateTo('manajemen-absensi')">
        <span class="nav-item-icon"><i data-lucide="calendar"></i></span>
        <span>Manajemen Absensi</span>
      </button>

      <button class="nav-item" data-page="approval-cuti" onclick="adminNavigateTo('approval-cuti')">
        <span class="nav-item-icon"><i data-lucide="umbrella"></i></span>
        <span>Approval Cuti</span>
        <span class="nav-item-badge" id="pendingCutiBadge" style="display:none">0</span>
      </button>

      <button class="nav-item" data-page="pengumuman" onclick="adminNavigateTo('pengumuman')">
        <span class="nav-item-icon"><i data-lucide="megaphone"></i></span>
        <span>Pengumuman Internal</span>
      </button>

      <div class="sidebar-nav-label">Analisis</div>

      <button class="nav-item" data-page="laporan" onclick="adminNavigateTo('laporan')">
        <span class="nav-item-icon"><i data-lucide="trending-up"></i></span>
        <span>Laporan & Statistik</span>
      </button>

      <button class="nav-item" data-page="pengaturan" onclick="adminNavigateTo('pengaturan')">
        <span class="nav-item-icon"><i data-lucide="settings"></i></span>
        <span>Pengaturan Sistem</span>
      </button>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="handleLogout()">
        <span class="nav-item-icon"><i data-lucide="log-out"></i></span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- ===================== SIDEBAR OVERLAY (Mobile) ===================== -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ===================== MAIN CONTENT ===================== -->
  <div class="main-wrapper">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <div class="topbar-title-wrapper">
          <p class="topbar-subtitle" id="topbarSubtitle">Welcome back, HRD 👋</p>
          <h1 class="topbar-title" id="pageTitle">Dashboard Overview</h1>
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-search-btn" id="topbarSearchBtn"><i data-lucide="search"></i></button>
        <button class="topbar-theme-toggle" id="topbarThemeToggle" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
        <button class="notif-btn" onclick="toggleNotifPanel()">
          <i data-lucide="bell"></i>
          <span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <div class="topbar-profile" style="display: flex; align-items: center; gap: 6px; padding: 2px 10px 2px 2px; border-radius: 9999px; cursor: pointer;">
          <div class="topbar-avatar" id="topbarAvatar"></div>
          <span style="font-size: 11px; font-weight: 700; color: var(--color-text-primary);">HRD Admin</span>
        </div>
      </div>
    </header>

    <!-- Notification Panel -->
    <div class="notif-panel hidden" id="notifPanel"></div>

    <!-- Page Content (SPA renders here) -->
    <main class="page-content" id="pageContent">
      <!-- Konten dimuat via JavaScript -->
    </main>
  </div>

  <!-- ===================== Toast Container ===================== -->
  <div id="toastContainer"></div>

  <!-- ===================== Scripts ===================== -->
  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/admin.js"></script>
</body>
</html>
